<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MARLIFT SERVICE OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff6600; /* Laranja Marlift */
            --gray-dark: #333333; /* Cinza Marlift */
            --gray-light: #f4f4f4;
            --white: #ffffff;
            --danger: #dc3545;
            --success: #28a745;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--gray-light); color: var(--gray-dark); }

        /* TELA DE LOGIN */
        #login-screen {
            position: fixed; inset: 0; background: var(--gray-dark);
            z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-box {
            background: var(--white); padding: 40px 30px; border-radius: 15px;
            width: 100%; max-width: 350px; text-align: center; border-top: 8px solid var(--primary);
        }
        .login-box h2 { margin-bottom: 20px; color: var(--gray-dark); font-weight: 800; }
        .login-box input {
            width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 20px; text-align: center; outline: none;
        }

        /* HEADER FIXO */
        header {
            background: var(--gray-dark); color: var(--white);
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--primary);
        }
        .header-top { padding: 15px; text-align: center; font-weight: 900; letter-spacing: 1px; font-size: 18px; }
        .header-info { background: #444; padding: 5px 15px; display: flex; justify-content: space-between; font-size: 12px; }

        /* NAVEGAÇÃO */
        .nav-tabs { display: flex; background: #222; }
        .tab-btn {
            flex: 1; padding: 15px; border: none; background: none;
            color: #888; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* CONTEÚDO */
        .container { max-width: 600px; margin: 0 auto; padding: 15px 15px 100px; }
        .card { background: var(--white); border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { font-size: 14px; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; text-transform: uppercase; }

        /* CRONOMETRO */
        .timer-container { text-align: center; background: #000; color: var(--primary); padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        #timer-display { font-family: monospace; font-size: 40px; font-weight: bold; }
        .timer-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .timer-log { font-size: 11px; color: #666; margin-top: 10px; text-align: left; max-height: 80px; overflow-y: auto; background: #f9f9f9; padding: 5px; border-radius: 5px; }

        /* FORMULÁRIO */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-control {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;
        }
        .form-control:disabled { background: #eee; color: #888; }

        /* FOTOS */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .photo-item { position: relative; aspect-ratio: 1; border: 1px solid #ddd; border-radius: 5px; overflow: hidden; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        /* BOTÕES */
        .btn {
            padding: 15px; border-radius: 8px; border: none; font-weight: bold;
            cursor: pointer; font-size: 14px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-dark { background: var(--gray-dark); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* MODAL ASSINATURA FULLSCREEN */
        #modal-signature {
            display: none; position: fixed; inset: 0; background: #fff; z-index: 20000;
            flex-direction: column;
        }
        .sig-header { background: var(--gray-dark); color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .sig-body { flex: 1; position: relative; touch-action: none; background: #fff; }
        #signature-canvas { width: 100%; height: 100%; }
        .sig-footer { padding: 20px; display: flex; gap: 10px; background: #f4f4f4; }

        /* HISTORICO */
        .hist-item { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .hist-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <h2>MARLIFT SERVICE</h2>
        <input type="password" id="login-pass" placeholder="Senha (mín. 6 dígitos)" maxlength="12">
        <button class="btn btn-primary" onclick="validateLogin()">ACESSAR</button>
    </div>
</div>

<header id="main-header" style="display:none">
    <div class="header-top">MARLIFT SERVICE OS</div>
    <div class="header-info">
        <span id="display-os-number">OS: #0001</span>
        <span id="display-date">--/--/----</span>
    </div>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('tab-os')">Nova OS</button>
        <button class="tab-btn" onclick="showTab('tab-history')">Histórico</button>
        <button class="tab-btn" onclick="showTab('tab-config')">Configurações</button>
    </div>
</header>

<div class="container" id="main-app" style="display:none">
    
    <!-- ABA: NOVA OS -->
    <div id="tab-os" class="tab-content">
        
        <!-- CRONOMETRO -->
        <div class="timer-container">
            <div id="timer-display">00:00:00</div>
            <div class="timer-controls">
                <button id="btn-start" class="btn btn-primary" onclick="startTimer()">INICIAR</button>
                <button id="btn-pause" class="btn btn-dark" onclick="showPauseMenu()" disabled>PAUSAR</button>
            </div>
            <div id="timer-log" class="timer-log"></div>
        </div>

        <div class="card">
            <h3>Dados do Cliente</h3>
            <div class="form-group">
                <label>RAZÃO SOCIAL / NOME</label>
                <input type="text" id="cli-nome" class="form-control os-input">
            </div>
            <div class="form-group">
                <label>ENDEREÇO DO ATENDIMENTO</label>
                <input type="text" id="cli-end" class="form-control os-input">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <div class="form-group"><label>MARCA</label><input type="text" id="eq-marca" class="form-control os-input"></div>
                <div class="form-group"><label>MODELO</label><input type="text" id="eq-modelo" class="form-control os-input"></div>
            </div>
            <div class="form-group">
                <label>Nº DE SÉRIE</label>
                <input type="text" id="eq-serie" class="form-control os-input">
            </div>
        </div>

        <div class="card">
            <h3>Relatório Técnico</h3>
            <div class="form-group">
                <label>DEFEITO RECLAMADO</label>
                <input type="text" id="rel-defeito" class="form-control os-input">
            </div>
            <div class="form-group">
                <label>SERVIÇO EXECUTADO</label>
                <textarea id="rel-servico" class="form-control os-input" rows="4"></textarea>
            </div>
        </div>

        <div class="card">
            <h3>Evidências (Fotos)</h3>
            <input type="file" id="photo-input" accept="image/*" capture="environment" multiple style="display:none" onchange="handlePhotos(this)">
            <button class="btn btn-outline os-input" onclick="document.getElementById('photo-input').click()"><i class="fa fa-camera"></i> ADICIONAR FOTOS</button>
            <div id="photo-grid" class="photo-grid"></div>
        </div>

        <div class="card">
            <h3>Encerramento</h3>
            <div class="form-group">
                <label>CONTATO DO CLIENTE (QUEM RECEBEU)</label>
                <input type="text" id="sig-contato" class="form-control os-input">
            </div>
            <div class="form-group">
                <label>DOCUMENTO (RG ou CPF)</label>
                <input type="text" id="sig-doc" class="form-control os-input">
            </div>
            
            <label style="font-size: 11px; font-weight: bold;">ASSINATURA</label>
            <div id="sig-preview" style="border:1px solid #ddd; height:100px; margin-bottom:15px; display:flex; align-items:center; justify-content:center; background:#f9f9f9;">
                <span style="color:#aaa; font-size:12px;">Pendente</span>
            </div>

            <button id="btn-open-sig" class="btn btn-dark os-input" onclick="openSignature()"><i class="fa fa-signature"></i> ASSINAR AGORA</button>
            
            <div style="margin-top:20px; display:grid; gap:10px">
                <button class="btn btn-primary" id="btn-save-os" onclick="saveOS()"><i class="fa fa-save"></i> SALVAR OS NO HISTÓRICO</button>
                <button class="btn btn-dark" id="btn-pdf" onclick="generatePDF()" disabled><i class="fa fa-file-pdf"></i> GERAR RELATÓRIO PDF</button>
            </div>
        </div>
    </div>

    <!-- ABA: HISTORICO -->
    <div id="tab-history" class="tab-content" style="display:none">
        <div id="history-list"></div>
    </div>

    <!-- ABA: CONFIG -->
    <div id="tab-config" class="tab-content" style="display:none">
        <div class="card">
            <h3>Configuração de Nuvem</h3>
            <div class="form-group">
                <label>URL DO GOOGLE APPS SCRIPT</label>
                <input type="text" id="cfg-url" class="form-control" placeholder="https://script.google.com/...">
            </div>
            <button class="btn btn-outline" onclick="copyAppScript()">COPIAR CÓDIGO SCRIPT</button>
        </div>
        <div class="card">
            <h3>Sistema</h3>
            <div class="form-group">
                <label>PRÓXIMO NÚMERO DE OS</label>
                <input type="number" id="cfg-next-num" class="form-control" value="1" onchange="updateOSCount()">
            </div>
            <button class="btn btn-danger" onclick="clearData()"><i class="fa fa-trash"></i> APAGAR TUDO</button>
        </div>
    </div>
</div>

<!-- MODAL ASSINATURA -->
<div id="modal-signature">
    <div class="sig-header">
        <span>ASSINATURA DO CLIENTE</span>
        <button onclick="closeSignature()" style="background:none; border:none; color:white; font-size:24px;">&times;</button>
    </div>
    <div class="sig-body">
        <canvas id="signature-canvas"></canvas>
    </div>
    <div class="sig-footer">
        <button class="btn btn-outline" onclick="clearCanvas()">LIMPAR TELA</button>
        <button class="btn btn-primary" onclick="saveSignature()">SALVAR ASSINATURA</button>
    </div>
</div>

<!-- MODAL MOTIVO PAUSA -->
<div id="modal-pause" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:30000; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; max-width:300px;">
        <h3>Motivo da Pausa</h3>
        <button class="btn btn-outline" style="margin-bottom:10px; text-align:left" onclick="pauseTimer('Almoço')">Almoço</button>
        <button class="btn btn-outline" style="margin-bottom:10px; text-align:left" onclick="pauseTimer('Aguardando Peça')">Aguardando Peça</button>
        <button class="btn btn-outline" style="margin-bottom:10px; text-align:left" onclick="pauseTimer('Máquina em Uso')">Equipamento em Uso</button>
        <button class="btn btn-outline" style="margin-bottom:10px; text-align:left" onclick="pauseTimer('Aguardando Aprovação')">Aguardando Aprovação</button>
        <button class="btn btn-dark" style="margin-top:10px" onclick="document.getElementById('modal-pause').style.display='none'">VOLTAR</button>
    </div>
</div>

<script>
// --- VARIÁVEIS GLOBAIS ---
let timerInterval, seconds = 0, timerStatus = 'parado', logs = [];
let photos = [], signatureData = null;
let canvas, ctx, drawing = false;
let currentOSNum = parseInt(localStorage.getItem('ml_os_count')) || 1;

// --- LOGIN ---
document.getElementById('login-pass').addEventListener('keypress', (e) => { if(e.key === 'Enter') validateLogin(); });
function validateLogin() {
    const pass = document.getElementById('login-pass').value;
    if(pass.length >= 6 && pass === '123456') { // SENHA PADRÃO: 123456
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('main-header').style.display = 'block';
        initSystem();
    } else { alert('Senha incorreta (mín. 6 dígitos).'); }
}

function initSystem() {
    updateOSCount();
    document.getElementById('display-date').innerText = new Date().toLocaleDateString('pt-BR');
    document.getElementById('cfg-url').value = localStorage.getItem('ml_google_url') || '';
}

// --- NAVEGAÇÃO ---
function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).style.display = 'block';
    event.currentTarget.classList.add('active');
    if(tab === 'tab-history') renderHistory();
}

// --- CRONOMETRO ---
function startTimer() {
    if(timerStatus === 'rodando') return;
    timerStatus = 'rodando';
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-pause').disabled = false;
    logs.push("▶ Início: " + new Date().toLocaleTimeString());
    updateTimerLog();
    timerInterval = setInterval(() => {
        seconds++;
        updateTimerDisplay();
    }, 1000);
}

function showPauseMenu() { document.getElementById('modal-pause').style.display = 'flex'; }

function pauseTimer(motivo) {
    clearInterval(timerInterval);
    timerStatus = 'pausado';
    logs.push(`⏸ Pausa (${motivo}): ` + new Date().toLocaleTimeString());
    updateTimerLog();
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-start').innerText = "RETOMAR";
    document.getElementById('btn-pause').disabled = true;
    document.getElementById('modal-pause').style.display = 'none';
}

function updateTimerDisplay() {
    const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
    const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
}

function updateTimerLog() { document.getElementById('timer-log').innerHTML = logs.join('<br>'); }

// --- FOTOS ---
function handlePhotos(input) {
    Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => { photos.push(e.target.result); renderPhotos(); };
        reader.readAsDataURL(file);
    });
}
function renderPhotos() {
    const grid = document.getElementById('photo-grid');
    grid.innerHTML = photos.map((p, i) => `<div class="photo-item"><img src="${p}"><button onclick="photos.splice(${i},1);renderPhotos()" style="position:absolute;top:0;right:0;background:red;color:white;border:none;">&times;</button></div>`).join('');
}

// --- ASSINATURA ---
function openSignature() {
    document.getElementById('modal-signature').style.display = 'flex';
    canvas = document.getElementById('signature-canvas');
    ctx = canvas.getContext('2d');
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;
    ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';

    ['mousedown', 'touchstart'].forEach(e => canvas.addEventListener(e, startDrawing));
    ['mousemove', 'touchmove'].forEach(e => canvas.addEventListener(e, draw));
    ['mouseup', 'touchend'].forEach(e => canvas.addEventListener(e, stopDrawing));
}

function startDrawing(e) { drawing = true; draw(e); }
function draw(e) {
    if(!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
}
function stopDrawing() { drawing = false; ctx.beginPath(); }
function clearCanvas() { ctx.clearRect(0,0,canvas.width, canvas.height); }
function closeSignature() { document.getElementById('modal-signature').style.display = 'none'; }

function saveSignature() {
    signatureData = canvas.toDataURL();
    document.getElementById('sig-preview').innerHTML = `<img src="${signatureData}" style="max-height:100%">`;
    clearInterval(timerInterval);
    logs.push("🏁 Fim: " + new Date().toLocaleTimeString());
    updateTimerLog();
    lockInputs(true);
    closeSignature();
}

function lockInputs(lock) {
    document.querySelectorAll('.os-input').forEach(i => i.disabled = lock);
    document.getElementById('btn-pdf').disabled = !lock;
    document.getElementById('btn-start').disabled = lock;
}

// --- SALVAR E HISTORICO ---
function updateOSCount() {
    const val = document.getElementById('cfg-next-num').value;
    currentOSNum = parseInt(val);
    localStorage.setItem('ml_os_count', currentOSNum);
    document.getElementById('display-os-number').innerText = "OS: #" + currentOSNum.toString().padStart(4, '0');
}

function saveOS() {
    if(!document.getElementById('cli-nome').value) { alert('Informe o cliente'); return; }
    const os = {
        id: Date.now(),
        num: currentOSNum,
        cliente: document.getElementById('cli-nome').value,
        endereco: document.getElementById('cli-end').value,
        marca: document.getElementById('eq-marca').value,
        modelo: document.getElementById('eq-modelo').value,
        serie: document.getElementById('eq-serie').value,
        defeito: document.getElementById('rel-defeito').value,
        servico: document.getElementById('rel-servico').value,
        contato: document.getElementById('sig-contato').value,
        doc: document.getElementById('sig-doc').value,
        tempo: document.getElementById('timer-display').innerText,
        segundos: seconds,
        logs: logs,
        fotos: photos,
        assinatura: signatureData,
        data: new Date().toLocaleString('pt-BR')
    };

    let hist = JSON.parse(localStorage.getItem('ml_history') || '[]');
    hist.unshift(os);
    localStorage.setItem('ml_history', JSON.stringify(hist));

    // Nuvem
    const url = document.getElementById('cfg-url').value;
    if(url) {
        localStorage.setItem('ml_google_url', url);
        fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(os) });
    }

    currentOSNum++;
    document.getElementById('cfg-next-num').value = currentOSNum;
    updateOSCount();
    alert('OS Salva com sucesso!');
}

function renderHistory() {
    const hist = JSON.parse(localStorage.getItem('ml_history') || '[]');
    const list = document.getElementById('history-list');
    if(hist.length === 0) { list.innerHTML = '<p style="text-align:center">Vazio</p>'; return; }
    
    list.innerHTML = hist.map(os => `
        <div class="hist-item">
            <div class="hist-header">
                <span>#${os.num.toString().padStart(4,'0')}</span>
                <span>${os.data}</span>
            </div>
            <div style="font-size:14px; margin-bottom:10px">${os.cliente}</div>
            <div style="display:flex; gap:10px">
                <button class="btn btn-outline" style="padding:5px" onclick="loadOS(${os.id})">EDITAR/RESGATAR</button>
                <button class="btn btn-dark" style="padding:5px; width:40px" onclick="deleteOS(${os.id})">&times;</button>
            </div>
        </div>
    `).join('');
}

function loadOS(id) {
    const hist = JSON.parse(localStorage.getItem('ml_history') || '[]');
    const os = hist.find(x => x.id === id);
    if(!os) return;

    document.getElementById('cli-nome').value = os.cliente;
    document.getElementById('cli-end').value = os.endereco;
    document.getElementById('eq-marca').value = os.marca;
    document.getElementById('eq-modelo').value = os.modelo;
    document.getElementById('eq-serie').value = os.serie;
    document.getElementById('rel-defeito').value = os.defeito;
    document.getElementById('rel-servico').value = os.servico;
    document.getElementById('sig-contato').value = os.contato;
    document.getElementById('sig-doc').value = os.doc;
    
    seconds = os.segundos;
    updateTimerDisplay();
    logs = os.logs;
    updateTimerLog();
    photos = os.fotos || [];
    renderPhotos();
    signatureData = os.assinatura;
    if(signatureData) {
        document.getElementById('sig-preview').innerHTML = `<img src="${signatureData}" style="max-height:100%">`;
        lockInputs(true);
    } else {
        lockInputs(false);
    }
    showTab('tab-os');
}

function deleteOS(id) {
    if(!confirm('Excluir OS?')) return;
    let hist = JSON.parse(localStorage.getItem('ml_history') || '[]');
    hist = hist.filter(x => x.id !== id);
    localStorage.setItem('ml_history', JSON.stringify(hist));
    renderHistory();
}

// --- PDF ---
function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const osNum = document.getElementById('display-os-number').innerText;

    doc.setFillColor(51, 51, 51); doc.rect(0, 0, 210, 30, 'F');
    doc.setTextColor(255, 102, 0); doc.setFontSize(22); doc.text("MARLIFT SERVICE", 105, 20, {align: 'center'});
    
    doc.setTextColor(0,0,0); doc.setFontSize(10);
    doc.text(osNum, 195, 35, {align: 'right'});
    doc.text("Data: " + document.getElementById('display-date').innerText, 15, 35);

    doc.setFont(undefined, 'bold'); doc.text("CLIENTE:", 15, 45); doc.setFont(undefined, 'normal');
    doc.text(document.getElementById('cli-nome').value, 15, 50);
    doc.text(document.getElementById('cli-end').value, 15, 55);

    doc.setFont(undefined, 'bold'); doc.text("EQUIPAMENTO:", 15, 65); doc.setFont(undefined, 'normal');
    doc.text(`${document.getElementById('eq-marca').value} - ${document.getElementById('eq-modelo').value}`, 15, 70);
    doc.text(`Série: ${document.getElementById('eq-serie').value}`, 15, 75);

    doc.setFont(undefined, 'bold'); doc.text("RELATÓRIO TÉCNICO:", 15, 85); doc.setFont(undefined, 'normal');
    doc.text("Tempo de Atendimento: " + document.getElementById('timer-display').innerText, 15, 90);
    doc.text("Defeito: " + document.getElementById('rel-defeito').value, 15, 95);
    const srv = doc.splitTextToSize("Serviço: " + document.getElementById('rel-servico').value, 180);
    doc.text(srv, 15, 100);

    if(signatureData) {
        doc.text("Assinatura do Cliente:", 15, 200);
        doc.addImage(signatureData, 'PNG', 15, 205, 60, 25);
        doc.text(`Recebido por: ${document.getElementById('sig-contato').value}`, 15, 235);
        doc.text(`Doc: ${document.getElementById('sig-doc').value}`, 15, 240);
    }

    doc.save(`OS_MARLIFT_${osNum}.pdf`);
}

function copyAppScript() {
    const code = `function doPost(e) {
  var data = JSON.parse(e.postData.contents);
  var ss = SpreadsheetApp.getActiveSpreadsheet();
