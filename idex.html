/* ============================================================
   DESIGN SYSTEM
   ============================================================ */
:root {
  --primary: #ff6600;
  --primary-dark: #cc5200;
  --primary-light: #fff3eb;
  --dark: #1e1e2e;
  --dark2: #2a2a3e;
  --gray: #6b7280;
  --gray-light: #f3f4f6;
  --border: #e5e7eb;
  --white: #ffffff;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  --font: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { font-family: var(--font); background: var(--gray-light); color: var(--dark); line-height: 1.6; min-height: 100vh; -webkit-tap-highlight-color: transparent; }

/* ============================================================
   LAYOUT
   ============================================================ */
.app { max-width: 640px; margin: 0 auto; padding-bottom: 76px; }

/* ============================================================
   HEADER
   ============================================================ */
.header { background: var(--dark); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-lg); }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 3px solid var(--primary); }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 38px; height: 38px; background: var(--primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; flex-shrink: 0; }
.logo-text h1 { color: white; font-size: 17px; font-weight: 800; letter-spacing: 1px; line-height: 1.1; }
.logo-text span { color: var(--primary); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
.btn-header { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 13px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 600; }
.btn-header:active { background: var(--primary); border-color: var(--primary); }

/* ============================================================
   NAV TABS
   ============================================================ */
.nav-tabs { display: flex; background: var(--dark2); }
.nav-tab { flex: 1; padding: 11px 8px; text-align: center; color: rgba(255,255,255,0.45); font-size: 11.5px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; user-select: none; }
.nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.nav-tab i { font-size: 13px; }

/* ============================================================
   BARRA DE PROGRESSO
   ============================================================ */
.prog-bar-wrap { background: var(--dark2); padding: 8px 16px 10px; }
.prog-steps { display: flex; gap: 4px; }
.prog-step { flex: 1; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.12); transition: background 0.3s; }
.prog-step.done { background: var(--success); }
.prog-step.active { background: var(--primary); }

/* ============================================================
   TAB CONTENT
   ============================================================ */
.tab-content { display: none; padding: 14px; }
.tab-content.active { display: block; }

/* ============================================================
   CARDS
   ============================================================ */
.card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow); }
.card-header { display: flex; align-items: center; gap: 11px; padding: 13px 15px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, var(--primary-light) 0%, var(--white) 70%); }
.card-icon { width: 34px; height: 34px; background: var(--primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; flex-shrink: 0; }
.card-title { font-size: 13px; font-weight: 800; color: var(--dark); text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.2; }
.card-subtitle { font-size: 11px; color: var(--gray); }
.card-body { padding: 15px; }
