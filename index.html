<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MARLIFT SERVICE OS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#ff6600;--primary-dark:#cc5200;--primary-light:#fff3eb;--dark:#1e1e2e;--dark2:#2a2a3e;--gray:#6b7280;--gray-light:#f3f4f6;--border:#e5e7eb;--white:#ffffff;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--radius:12px;--radius-sm:8px;--shadow:0 4px 20px rgba(0,0,0,0.08);--shadow-lg:0 8px 40px rgba(0,0,0,0.15);--font:'Segoe UI',system-ui,-apple-system,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gray-light);color:var(--dark);line-height:1.6;min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}

/* LOGIN SCREEN */
#loginScreen{position:fixed;inset:0;background:var(--dark);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--white);padding:30px;border-radius:var(--radius);width:100%;max-width:350px;text-align:center;box-shadow:var(--shadow-lg)}
.login-logo{width:60px;height:60px;background:var(--primary);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:30px}

.app{max-width:640px;margin:0 auto;padding:0 0 80px;display:none} /* Oculta app até login */

/* HEADER */
.header{background:var(--dark);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-lg)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:3px solid var(--primary)}
.logo-text h1{color:white;font-size:18px;font-weight:800;letter-spacing:1px;margin:0}

/* MODAL ASSINATURA FULLSCREEN */
#modalAssinatura.modal.open{display:flex}
#modalAssinatura .modal-box{width:100vw;height:100vh;max-width:none;max-height:none;border-radius:0;display:flex;flex-direction:column}
#modalAssinatura .modal-body{flex:1;display:flex;flex-direction:column;padding:10px}
#modalAssinatura .canvas-wrap{flex:1;border:2px solid var(--border);margin-bottom:10px;position:relative}
#canvasAssinatura{width:100%;height:100%;background:#fff}

/* RESTANTE DO CSS */
.nav-tabs{display:flex;background:var(--dark2);padding:0 16px}
.nav-tab{flex:1;padding:12px 8px;text-align:center;color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;display:flex;align-items:center;justify-content:center;gap:6px}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-content{display:none;padding:16px}
.tab-content.active{display:block}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--primary-light),var(--white))}
.card-title{font-size:14px;font-weight:700;text-transform:uppercase}
.card-body{padding:16px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;text-transform:uppercase}
.form-control{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px}
.form-control:disabled{background:#f0f0f0;color:#888;cursor:not-allowed;border-color:#ddd}
.btn{padding:13px 18px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn-primary{background:var(--primary);color:white}
.btn-secondary{background:var(--dark);color:white}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}
.btn-danger{background:var(--danger);color:white}
.btn-warning{background:var(--warning);color:white}
.os-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-right:5px}
.badge-green{background:#d1fae5;color:#059669}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);display:flex;z-index:200;border-top:2px solid var(--primary)}
.bottom-nav-item{flex:1;padding:12px 5px;text-align:center;color:rgba(255,255,255,0.45);font-size:10px;background:none;border:none}
.bottom-nav-item.active{color:var(--primary)}
.bottom-nav-item i{display:block;font-size:18px;margin-bottom:3px}
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-top:12px}
.photo-item{position:relative;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.photo-item img{width:100%;height:100%;object-fit:cover}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-box{background:white;border-radius:var(--radius);width:100%;max-width:400px;overflow:hidden}
.modal-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sig-preview{min-height:100px;border:2px dashed var(--border);border-radius:var(--radius-sm);margin-bottom:10px;display:flex;align-items:center;justify-content:center;background:#fafafa}
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><i class="fa-solid fa-lock"></i></div>
    <h2 style="margin-bottom:5px">MARLIFT SERVICE</h2>
    <p style="font-size:12px;color:var(--gray);margin-bottom:20px">Acesso Restrito</p>
    <input type="password" id="loginSenha" class="form-control" placeholder="Digite a senha" style="text-align:center;margin-bottom:15px">
    <button class="btn btn-primary" onclick="verificarLogin()">Entrar no Sistema</button>
  </div>
</div>

<div class="app" id="appContent">
  <header class="header">
    <div class="header-top">
      <div class="logo-text"><h1>MARLIFT SERVICE OS</h1></div>
      <button class="btn btn-primary" style="width:auto;padding:8px 12px" onclick="novaOS()"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="nav-tabs" id="navTabs">
      <div class="nav-tab active" data-tab="tab-os" onclick="switchTab('tab-os')">Nova OS</div>
      <div class="nav-tab" data-tab="tab-history" onclick="switchTab('tab-history')">Histórico</div>
      <div class="nav-tab" data-tab="tab-config" onclick="switchTab('tab-config')">Config</div>
    </div>
  </header>

  <!-- ABA: NOVA OS -->
  <div id="tab-os" class="tab-content active">
    
    <div class="card">
      <div class="card-header"><div class="card-title">Cliente & Equipamento</div></div>
      <div class="card-body">
        <div class="form-group"><label class="form-label">Cliente</label><input type="text" id="cliNome" class="form-control os-input" placeholder="Razão Social"></div>
        <div class="form-group"><label class="form-label">Endereço</label><input type="text" id="cliEndereco" class="form-control os-input" placeholder="Cidade - UF"></div>
        <div class="row" style="display:flex;gap:10px">
          <div class="form-group" style="flex:1"><label class="form-label">Marca</label><input type="text" id="eqMarca" class="form-control os-input"></div>
          <div class="form-group" style="flex:1"><label class="form-label">Modelo</label><input type="text" id="eqModelo" class="form-control os-input"></div>
        </div>
        <div class="form-group"><label class="form-label">Nº Série</label><input type="text" id="eqSerie" class="form-control os-input"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">Relato Técnico</div></div>
      <div class="card-body">
        <div class="form-group"><label class="form-label">Defeito</label><input type="text" id="defeito" class="form-control os-input"></div>
        <div class="form-group"><label class="form-label">Serviço Executado</label><textarea id="servico" class="form-control os-input" rows="4"></textarea></div>
      </div>
    </div>

    <div class="card">
        <div class="card-header"><div class="card-title">Fotos</div></div>
        <div class="card-body">
            <input type="file" id="inputFotos" accept="image/*" multiple style="display:none" onchange="adicionarFotos(this)">
            <button class="btn btn-outline os-input" onclick="document.getElementById('inputFotos').click()"><i class="fa-solid fa-camera"></i> Adicionar Fotos</button>
            <div id="photosGrid" class="photos-grid"></div>
        </div>
    </div>

    <!-- ENCERRAMENTO -->
    <div class="card" id="cardEncerramento">
      <div class="card-header"><div class="card-title">Encerramento</div></div>
      <div class="card-body">
        <div class="form-group"><label class="form-label">Nome do Contato (Quem recebeu)</label><input type="text" id="sigNomeContato" class="form-control os-input" placeholder="Ex: João Silva"></div>
        <div class="form-group"><label class="form-label">Documento (RG ou CPF)</label><input type="text" id="sigDocContato" class="form-control os-input" placeholder="000.000.000-00"></div>
        
        <label class="form-label">Assinatura</label>
        <div id="sigPreview" class="sig-preview">Aguardando assinatura...</div>
        
        <button class="btn btn-warning os-input" id="btnAbrirAssinatura" onclick="abrirModalAssinatura()"><i class="fa-solid fa-pen-nib"></i> Coletar Assinatura do Cliente</button>
        
        <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px">
            <button id="btnSalvarOS" class="btn btn-secondary" onclick="salvarOS()"><i class="fa-solid fa-floppy-disk"></i> Salvar no Histórico</button>
            <button id="btnGerarPdf" class="btn btn-primary" onclick="gerarPDF()" disabled><i class="fa-solid fa-file-pdf"></i> GERAR PDF FINAL</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ABA: HISTÓRICO -->
  <div id="tab-history" class="tab-content">
    <div id="osList"></div>
  </div>

  <!-- ABA: CONFIG -->
  <div id="tab-config" class="tab-content">
    <div class="card">
        <div class="card-body">
            <button class="btn btn-danger" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sair do Sistema</button>
        </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="bottom-nav-item active" onclick="switchTab('tab-os')"><i class="fa-solid fa-file-pen"></i> OS</button>
    <button class="bottom-nav-item" onclick="switchTab('tab-history')"><i class="fa-solid fa-list"></i> Histórico</button>
    <button class="bottom-nav-item" onclick="switchTab('tab-config')"><i class="fa-solid fa-gear"></i> Config</button>
  </nav>
</div>

<!-- MODAL ASSINATURA FULLSCREEN -->
<div id="modalAssinatura" class="modal">
  <div class="modal-box">
    <div class="modal-header">
        <h3>Assinatura do Cliente</h3>
        <button onclick="fecharModais()" style="background:none;border:none;font-size:24px">&times;</button>
    </div>
    <div class="modal-body">
      <div class="canvas-wrap">
        <canvas id="canvasAssinatura"></canvas>
      </div>
      <div style="display:flex;gap:10px">
          <button class="btn btn-outline" onclick="limparCanvas()">Limpar Tela</button>
          <button class="btn btn-primary" onclick="confirmarAssinatura()">Salvar Assinatura</button>
      </div>
    </div>
  </div>
</div>

<script>
let fotosArray = [];
let assinaturaImg = null;
let canvas, ctx, desenhando = false;
let osBloqueada = false;

// --- LOGIN ---
function verificarLogin() {
    const senha = document.getElementById('loginSenha').value;
    if(senha === '123') { // DEFINA SUA SENHA AQUI
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
        localStorage.setItem('marlift_logado', 'true');
    } else {
        alert('Senha incorreta!');
    }
}

function logout() {
    localStorage.removeItem('marlift_logado');
    location.reload();
}

// --- NAVEGAÇÃO ---
function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active'));
    if(id === 'tab-history') renderHistorico();
}

// --- ASSINATURA ---
function abrirModalAssinatura() {
    document.getElementById('modalAssinatura').classList.add('open');
    setTimeout(initCanvas, 100);
}

function initCanvas() {
    canvas = document.getElementById('canvasAssinatura');
    const wrap = canvas.parentElement;
    canvas.width = wrap.offsetWidth;
    canvas.height = wrap.offsetHeight;
    ctx = canvas.getContext('2d');
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000';

    const events = ['mousedown', 'mousemove', 'mouseup', 'touchstart', 'touchmove', 'touchend'];
    events.forEach(ev => canvas.addEventListener(ev, handlePos, false));
}

function handlePos(e) {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

    if(e.type === 'mousedown' || e.type === 'touchstart') {
        desenhando = true;
        ctx.beginPath();
        ctx.moveTo(x, y);
    } else if((e.type === 'mousemove' || e.type === 'touchmove') && desenhando) {
        ctx.lineTo(x, y);
        ctx.stroke();
    } else {
        desenhando = false;
    }
}

function limparCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

function confirmarAssinatura() {
    assinaturaImg = canvas.toDataURL();
    document.getElementById('sigPreview').innerHTML = `<img src="${assinaturaImg}" style="max-height:80px">`;
    fecharModais();
    bloquearEdicao(true);
}

function fecharModais() { 
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); 
}

// --- LÓGICA DE BLOQUEIO ---
function bloquearEdicao(bloquear) {
    osBloqueada = bloquear;
    const inputs = document.querySelectorAll('.os-input');
    inputs.forEach(input => input.disabled = bloquear);
    document.getElementById('btnGerarPdf').disabled = !bloquear;
    if(bloquear) {
        document.getElementById('btnSalvarOS').classList.replace('btn-secondary', 'btn-success');
    }
}

// --- FOTOS ---
function adicionarFotos(input) {
    Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
            fotosArray.push(e.target.result);
            renderFotos();
        };
        reader.readAsDataURL(file);
    });
}

function renderFotos() {
    const grid = document.getElementById('photosGrid');
    grid.innerHTML = fotosArray.map((src, i) => `
        <div class="photo-item">
            <img src="${src}">
            ${!osBloqueada ? `<button onclick="fotosArray.splice(${i},1);renderFotos()" style="position:absolute;top:0;right:0;background:red;color:white;border:none;width:20px;height:20px">×</button>` : ''}
        </div>
    `).join('');
}

// --- HISTÓRICO E EDIÇÃO ---
function salvarOS() {
    const os = {
        id: Date.now(),
        cliente: document.getElementById('cliNome').value,
        endereco: document.getElementById('cliEndereco').value,
        marca: document.getElementById('eqMarca').value,
        modelo: document.getElementById('eqModelo').value,
        serie: document.getElementById('eqSerie').value,
        defeito: document.getElementById('defeito').value,
        servico: document.getElementById('servico').value,
        contato: document.getElementById('sigNomeContato').value,
        documento: document.getElementById('sigDocContato').value,
        assinatura: assinaturaImg,
        fotos: fotosArray,
        data: new Date().toLocaleString()
    };
    let historico = JSON.parse(localStorage.getItem('marlift_hist') || '[]');
    historico.unshift(os);
    localStorage.setItem('marlift_hist', JSON.stringify(historico));
    alert('OS salva no histórico!');
}

function renderHistorico() {
    const hist = JSON.parse(localStorage.getItem('marlift_hist') || '[]');
    const container = document.getElementById('osList');
    if(hist.length === 0) { container.innerHTML = '<p style="text-align:center;padding:20px">Nenhuma OS encontrada.</p>'; return; }
    
    container.innerHTML = hist.map(os => `
        <div class="os-card">
            <div style="display:flex;justify-content:space-between">
                <strong>${os.cliente}</strong>
                <span style="font-size:10px">${os.data}</span>
            </div>
            <div style="font-size:12px;color:var(--gray)">${os.marca} ${os.modelo} - S/N: ${os.serie}</div>
            <div style="margin-top:10px;display:flex;gap:10px">
                <button class="btn btn-outline" style="padding:5px" onclick="editarOS(${os.id})">Editar/Resgatar</button>
                <button class="btn btn-danger" style="padding:5px;width:40px" onclick="excluirOS(${os.id})"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
    `).join('');
}

function editarOS(id) {
    const hist = JSON.parse(localStorage.getItem('marlift_hist') || '[]');
    const os = hist.find(item => item.id === id);
    if(!os) return;

    if(!confirm('Deseja carregar esta OS para edição?')) return;

    document.getElementById('cliNome').value = os.cliente;
    document.getElementById('cliEndereco').value = os.endereco;
    document.getElementById('eqMarca').value = os.marca;
    document.getElementById('eqModelo').value = os.modelo;
    document.getElementById('eqSerie').value = os.serie;
    document.getElementById('defeito').value = os.defeito;
    document.getElementById('servico').value = os.servico;
    document.getElementById('sigNomeContato').value = os.contato;
    document.getElementById('sigDocContato').value = os.documento;
    
    fotosArray = os.fotos || [];
    renderFotos();
    
    assinaturaImg = os.assinatura;
    if(assinaturaImg) {
        document.getElementById('sigPreview').innerHTML = `<img src="${assinaturaImg}" style="max-height:80px">`;
        bloquearEdicao(true);
    } else {
        document.getElementById('sigPreview').innerHTML = `Aguardando assinatura...`;
        bloquearEdicao(false);
    }

    switchTab('tab-os');
}

function excluirOS(id) {
    if(!confirm('Excluir definitivamente?')) return;
    let hist = JSON.parse(localStorage.getItem('marlift_hist') || '[]');
    hist = hist.filter(os => os.id !== id);
    localStorage.setItem('marlift_hist', JSON.stringify(hist));
    renderHistorico();
}

function novaOS() {
    if(!confirm('Limpar tela e iniciar nova OS?')) return;
    location.reload();
}

// --- GERAÇÃO DE PDF ---
function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFontSize(20);
    doc.text("MARLIFT SERVICE OS", 105, 20, { align: 'center' });
    
    doc.setFontSize(12);
    doc.text(`Cliente: ${document.getElementById('cliNome').value}`, 15, 40);
    doc.text(`Equipamento: ${document.getElementById('eqMarca').value} ${document.getElementById('eqModelo').value}`, 15, 50);
    doc.text(`Série: ${document.getElementById('eqSerie').value}`, 15, 60);
    
    doc.text("Serviço Executado:", 15, 80);
    doc.setFontSize(10);
    const splitServico = doc.splitTextToSize(document.getElementById('servico').value, 180);
    doc.text(splitServico, 15, 85);
    
    let y = 130;
    doc.setFontSize(12);
    doc.text("Encerramento:", 15, y);
    doc.text(`Recebido por: ${document.getElementById('sigNomeContato').value}`, 15, y + 10);
    doc.text(`Documento: ${document.getElementById('sigDocContato').value}`, 15, y + 17);
    
    if(assinaturaImg) {
        doc.addImage(assinaturaImg, 'PNG', 15, y + 25, 60, 20);
    }
    
    const nomeArquivo = `OS_MARLIFT_${Date.now()}.pdf`;
    doc.save(nomeArquivo);
    alert('PDF enviado para a pasta de downloads!');
}

// Inicia logado se já tiver feito login antes
if(localStorage.getItem('marlift_logado') === 'true') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
}
</script>
</body>
</html>
